<!DOCTYPE html>
<html>
<head>
<title>QuizWorld Multiplayer</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>
<style>
body { font-family: Arial; background: linear-gradient(135deg,#667eea,#764ba2); text-align:center; color:white;}
#box { background:rgba(0,0,0,0.75); width:600px; margin:auto; margin-top:30px; padding:20px; border-radius:15px;}
button { padding:8px; margin:5px; border-radius:8px; border:none; cursor:pointer; font-weight:bold;}
input { padding:6px; margin:5px;}
#chatBox { height:120px; overflow-y:scroll; background:black; padding:5px; text-align:left;}
.hidden { display:none;}
</style>
</head>
<body>
<div id="box">
<h1>QuizWorld 🌍</h1>

<div id="lobby">
<input id="playerName" placeholder="Enter name">
<button onclick="joinGame()">Join</button>
</div>

<div id="game" class="hidden">
<h2 id="welcome"></h2>
<p>Gold: <span id="gold">0</span></p>

<h3>Question</h3>
<p id="question"></p>
<div id="answers"></div>

<hr>

<h3>Chat</h3>
<div id="chatBox"></div>
<input id="chatInput" placeholder="Message">
<button onclick="sendMessage()">Send</button>

<hr>

<h3>Leaderboard</h3>
<div id="leaderboard"></div>
</div>
</div>

<script>
/* 🔥 PASTE YOUR FIREBASE CONFIG BELOW */
const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  databaseURL: "PASTE",
  projectId: "PASTE",
  storageBucket: "PASTE",
  messagingSenderId: "PASTE",
  appId: "PASTE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentPlayer = "";
let questions = [
 {q:"2+2?", a:["3","4","5"], correct:1},
 {q:"Capital of France?", a:["London","Paris","Rome"], correct:1}
];

function joinGame(){
 const name = document.getElementById("playerName").value;
 if(!name) return alert("Enter name");
 currentPlayer = name;

 db.ref("players/"+name).set({
   gold:0
 });

 document.getElementById("lobby").classList.add("hidden");
 document.getElementById("game").classList.remove("hidden");
 document.getElementById("welcome").innerText="Welcome "+name;

 loadQuestion();
 listenLeaderboard();
 listenChat();
}

function loadQuestion(){
 const rand = Math.floor(Math.random()*questions.length);
 const q = questions[rand];
 document.getElementById("question").innerText=q.q;
 const ansDiv=document.getElementById("answers");
 ansDiv.innerHTML="";
 q.a.forEach((ans,index)=>{
   const btn=document.createElement("button");
   btn.innerText=ans;
   btn.onclick=()=>{
     if(index===q.correct){
       db.ref("players/"+currentPlayer+"/gold").transaction(g=> (g||0)+50);
       alert("Correct! +50 Gold");
     } else alert("Wrong!");
     loadQuestion();
   };
   ansDiv.appendChild(btn);
 });
}

function listenLeaderboard(){
 db.ref("players").on("value",snapshot=>{
   const data=snapshot.val();
   const lb=document.getElementById("leaderboard");
   lb.innerHTML="";
   for(let p in data){
     lb.innerHTML+=`<p>${p} - ${data[p].gold} gold</p>`;
   }
   document.getElementById("gold").innerText=data[currentPlayer]?.gold||0;
 });
}

function sendMessage(){
 const msg=document.getElementById("chatInput").value;
 if(!msg) return;
 db.ref("chat").push({
   player:currentPlayer,
   text:msg
 });
 document.getElementById("chatInput").value="";
}

function listenChat(){
 db.ref("chat").limitToLast(50).on("child_added",snapshot=>{
   const data=snapshot.val();
   const chat=document.getElementById("chatBox");
   chat.innerHTML+=`<p><b>${data.player}:</b> ${data.text}</p>`;
   chat.scrollTop=chat.scrollHeight;
 });
}
</script>
</body>
</html>
